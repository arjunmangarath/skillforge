steps:
  # ── 1. Build backend image ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    args:
      - build
      - -f
      - infra/backend.dockerfile
      - -t
      - gcr.io/$PROJECT_ID/skillforge-backend:$COMMIT_SHA
      - .

  # ── 2. Build frontend image (with backend URL baked in via --build-arg) ──
  # Backend URL is stable — only changes if service is deleted and recreated.
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    args:
      - build
      - -f
      - infra/frontend.dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://skillforge-backend-991002074047.us-central1.run.app/api/v1
      - --build-arg
      - NEXT_PUBLIC_DEV_MODE=true
      - --build-arg
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=placeholder
      - -t
      - gcr.io/$PROJECT_ID/skillforge-frontend:$COMMIT_SHA
      - .

  # ── 3. Push both images (parallel after both builds) ────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    waitFor: [build-backend]
    args: [push, gcr.io/$PROJECT_ID/skillforge-backend:$COMMIT_SHA]

  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    waitFor: [build-frontend]
    args: [push, gcr.io/$PROJECT_ID/skillforge-frontend:$COMMIT_SHA]

  # ── 4. Deploy backend FIRST so we can get its URL ───────────────────────
  # AlloyDB public IP: 34.66.160.111
  # ALLOYDB_URL secret format: postgresql+asyncpg://postgres:PASS@34.66.160.111:5432/skillforge
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy-backend
    waitFor: [push-backend]
    args:
      - beta
      - run
      - deploy
      - skillforge-backend
      - --image=gcr.io/$PROJECT_ID/skillforge-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-secrets=ALLOYDB_URL=alloydb-url:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest
      - --set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=1,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,GEMINI_MODEL=gemini-2.5-flash,GEMINI_FLASH_MODEL=gemini-2.5-flash,DEV_MODE=true,DEV_USER_ID=dev-user-001

  # ── 5. Resolve backend URL then deploy frontend ──────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy-frontend
    waitFor: [deploy-backend, push-frontend]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$$(gcloud run services describe skillforge-backend \
          --region=us-central1 \
          --format='value(status.url)')
        echo "Backend URL: $$BACKEND_URL"
        gcloud run deploy skillforge-frontend \
          --image=gcr.io/$PROJECT_ID/skillforge-frontend:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --set-env-vars="NEXT_PUBLIC_API_URL=$${BACKEND_URL}/api/v1,NEXT_PUBLIC_DEV_MODE=true,NEXT_PUBLIC_GOOGLE_CLIENT_ID=placeholder"

images:
  - gcr.io/$PROJECT_ID/skillforge-backend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/skillforge-frontend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
